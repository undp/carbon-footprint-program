version: "3.9"

# Local SQL Server for multi-database development/testing.
# Uses a custom image (sqlserver-tls/Dockerfile) that presents a TLS cert we
# control, so the Prisma 7 schema engine can verify it via SSL_CERT_FILE (it
# ignores trustServerCertificate — see multi-db design.md finding 12).
#
# Usage:
#   1. ./scripts/gen-sqlserver-cert.sh                                  # once
#   2. docker compose -f docker-compose.sqlserver.yml up -d --build
#   3. ./scripts/provision-sqlserver.sh                                  # creates `huella` DB
#   4. SSL_CERT_FILE=$PWD/sqlserver-tls/mssql.pem DB_PROVIDER=sqlserver \
#        DATABASE_URL='sqlserver://localhost:1433;database=huella;user=sa;password=HuellaLocal2026;encrypt=true' \
#        pnpm dev:migrate:mssql -- --name initial
#
# Note: no persistent volume — data is ephemeral so the baked mssql.conf (under
# /var/opt/mssql) is always used. Re-seed after each recreate.
services:
  sqlserver:
    build:
      context: ./sqlserver-tls
    image: undp-sqlserver-tls:2019
    container_name: undp-sqlserver
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      # Symbol-free on purpose: avoids SQL Server connection-string brace-escaping.
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-HuellaLocal2026}"
      MSSQL_PID: "Developer"
      MSSQL_COLLATION: "Latin1_General_100_CS_AS_SC_UTF8"
