packages:
  - apps/*
  - packages/*
  - tools/*

# Reject dependencies published less than 12 hours ago (value is in minutes).
minimumReleaseAge: 720

allowBuilds:
  '@prisma/engines': true
  esbuild: true
  prisma: true
  cpu-features: false
  protobufjs: false
  ssh2: false

catalogs:
  shared:
    '@types/node': ^25.9.4
    eslint: ^9.39.4
    pino: ^10.3.1
    rimraf: ^6.1.3
    tsx: ^4.22.5
    typescript: ^6.0.3
    vitest: ^4.1.9
    zod: ^4.4.3

overrides:
  'exceljs>uuid': ^11.1.1
  '@hookform/devtools>uuid': ^11.1.1
  '@prisma/dev>@hono/node-server': 1.19.13
