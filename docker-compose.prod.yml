# =============================================================================
# Huella Latam — PRODUCTION docker-compose (on-premise, external PostgreSQL)
# =============================================================================
# Runs only `api` and `web`. PostgreSQL is NOT part of this stack — it is an
# external server reached through DATABASE_URL. Migrations and seeds are not
# automated here either; they are applied manually before starting the stack.
#
# Usage:
#   cp .env.prod.dockercompose.example .env.prod.dockercompose   # then fill it in
#   docker compose -f docker-compose.prod.yml --env-file .env.prod.dockercompose up -d --build
#
# Full guide: docs/operations/production-deployment.md
# =============================================================================

# Explicit project name: gives this stack its own containers and network so it
# never collides with a dev stack started from the same checkout.
name: huella-latam-prod

services:
  api:
    image: huella-latam-api:prod
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: huella-latam-api-prod
    ports:
      # Host port is configurable; the container always listens on 8080.
      - "${API_PORT:-8080}:8080"
    environment:
      # --- Core ---
      - NODE_ENV=production
      - API_HOST=0.0.0.0
      - API_PORT=8080
      # Full connection string to the EXTERNAL PostgreSQL server (application
      # user, URL-encoded password) — see .env.prod.dockercompose.example.
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required (external PostgreSQL connection string)}
      # Unused when AUTH_PROVIDER=jwks is fully configured (tokens are
      # verified against the IdP's public keys). It is only the static HMAC
      # fallback if the JWKS config is incomplete — setting a strong value
      # (`openssl rand -base64 48`) keeps that fallback unforgeable.
      - JWT_SECRET=${JWT_SECRET:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - APP_VERSION=${APP_VERSION:-prod}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:?ALLOWED_ORIGIN is required (the web app's browser origin)}
      # Public origin of THIS API (browser-reachable, no path) — required when
      # MINIO_RELAY_ENABLED=true so the relay can rewrite presigned URLs.
      - API_ORIGIN=${API_ORIGIN:-}
      # --- Auth: jwks (production) ---
      - AUTH_PROVIDER=${AUTH_PROVIDER:?AUTH_PROVIDER is required (jwks in production)}
      - SUPERADMIN_EMAIL=${SUPERADMIN_EMAIL:-}
      # --- JWKS: how the API validates OIDC tokens (AUTH_PROVIDER=jwks). The API
      #     reads JWKS_* directly — no AZURE_* auth vars. Azure Entra: derive per
      #     docs/infrastructure/AzureAuthenticationSetup.md. ---
      - JWKS_URI=${JWKS_URI:-}
      - JWKS_ISSUER=${JWKS_ISSUER:-}
      - JWKS_AUDIENCE=${JWKS_AUDIENCE:-}
      - JWKS_REQUIRED_SCOPE=${JWKS_REQUIRED_SCOPE:-}
      - JWKS_SKIP_SCOPE_CHECK=${JWKS_SKIP_SCOPE_CHECK:-}
      # --- Object storage: azure_blob_storage | minio ---
      # Required: the API aborts at boot if unset (no silent provider default).
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-}
      # --- Azure Blob Storage (used when STORAGE_PROVIDER=azure_blob_storage) ---
      - AZURE_STORAGE_ACCOUNT_NAME=${AZURE_STORAGE_ACCOUNT_NAME:-}
      - AZURE_STORAGE_CONTAINER_NAME=${AZURE_STORAGE_CONTAINER_NAME:-}
      # Dedicated service principal for storage (different tenant than JWKS).
      # On-premise hosts have no Azure Managed Identity, so when storage is
      # enabled all three SP vars must be set together.
      - AZURE_STORAGE_TENANT_ID=${AZURE_STORAGE_TENANT_ID:-}
      - AZURE_STORAGE_CLIENT_ID=${AZURE_STORAGE_CLIENT_ID:-}
      - AZURE_STORAGE_CLIENT_SECRET=${AZURE_STORAGE_CLIENT_SECRET:-}
      # --- MinIO / S3-compatible (used when STORAGE_PROVIDER=minio) ---
      # The MinIO server is EXTERNAL to this stack (like PostgreSQL above). When
      # STORAGE_PROVIDER=minio the API requires MINIO_ENDPOINT, MINIO_ACCESS_KEY,
      # and MINIO_SECRET_KEY and refuses to boot if any is missing.
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MINIO_BUCKET=${MINIO_BUCKET:-files}
      - MINIO_REGION=${MINIO_REGION:-us-east-1}
      - MINIO_FORCE_PATH_STYLE=${MINIO_FORCE_PATH_STYLE:-true}
      # Storage relay. true → the API rewrites presigned MinIO
      # URLs to <API_ORIGIN>/api/storage and serves them at /api/storage/*, so
      # MinIO need not be exposed publicly (needs API_ORIGIN above).
      # false/unset → the browser hits MinIO directly (historical default).
      - MINIO_RELAY_ENABLED=${MINIO_RELAY_ENABLED:-false}
    # No depends_on: the database is external. If it is unreachable the API
    # exits at boot and `restart: unless-stopped` retries until it answers.
    restart: unless-stopped
    networks:
      - huella-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    image: huella-latam-web:prod
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?VITE_API_BASE_URL is required (browser-reachable API URL)}
        # Generic OIDC config — the IdP is selected per deployment. ISSUER also
        # derives the IdP origin baked into the nginx CSP.
        VITE_OIDC_ISSUER: ${VITE_OIDC_ISSUER:?VITE_OIDC_ISSUER is required (the OIDC issuer / authority URL)}
        VITE_OIDC_CLIENT_ID: ${VITE_OIDC_CLIENT_ID:?VITE_OIDC_CLIENT_ID is required (public SPA client id)}
        VITE_OIDC_REDIRECT_URI: ${VITE_OIDC_REDIRECT_URI:?VITE_OIDC_REDIRECT_URI is required (browser-reachable /auth/callback URL)}
        VITE_OIDC_SCOPES: ${VITE_OIDC_SCOPES:?VITE_OIDC_SCOPES is required (e.g. "openid profile email"; the app fails loud at boot if empty)}
        VITE_OIDC_POST_LOGOUT_REDIRECT_URI: ${VITE_OIDC_POST_LOGOUT_REDIRECT_URI:-}
        # Browser-facing object-storage origin baked into the nginx CSP
        # (connect-src/img-src) — e.g. https://storage.example.com (MinIO) or
        # https://<account>.blob.core.windows.net. REQUIRED for browser uploads:
        # if empty, the CSP omits storage and presigned PUT/GET are blocked.
        STORAGE_ORIGIN: ${STORAGE_ORIGIN:-}
        VITE_IS_DEMO_APP: ${VITE_IS_DEMO_APP:-false}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-prod}
    container_name: huella-latam-web-prod
    ports:
      - "${WEB_PORT:-80}:8080"
    depends_on:
      # Wait until the API passes its /health check, not just until its
      # container starts — so the whole stack is coherent before web is up.
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - huella-network
    healthcheck:
      # 127.0.0.1 forces IPv4: nginx listens IPv4-only and BusyBox wget won't
      # fall back from localhost→::1, so localhost would fail the healthcheck.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  huella-network:
    driver: bridge
