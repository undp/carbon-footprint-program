server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Content-Security-Policy. The IdP and API origins are baked at BUILD time —
    # the __IDP_ORIGIN__ / __API_ORIGIN__ placeholders are substituted in the
    # Dockerfile from VITE_OIDC_ISSUER / VITE_API_BASE_URL (the runner image has
    # no runtime env; Vite is build-time, so a rebuild is needed to change them).
    # connect-src also allows `https:` for Azure Blob / CDN storage; a non-https
    # storage origin (e.g. MinIO over http on-prem) must be added here for uploads.
    # Switching IdP/country = change the env + rebuild, never hand-edit this line.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' __API_ORIGIN__ __IDP_ORIGIN__ https:; frame-src 'self' __IDP_ORIGIN__; form-action 'self' __IDP_ORIGIN__;" always;

    # Hashed assets — safe to cache long-term
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback — TanStack Router handles client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
