server {
    listen      8080;
    server_name _;
    server_tokens off;                 # don't leak the nginx version

    root  /usr/share/nginx/html;
    index index.html;

    # --- Client IP: intentionally NOT recovered here ---
    # This container sees plain HTTP from the upstream proxy, so $remote_addr (and
    # every access-log line) is the proxy IP, not the visitor. We deliberately don't
    # rewrite it from X-Forwarded-For: trusting that header depends on the proxy's
    # behaviour (append vs replace, chain depth) and a broad private-range trust just
    # lets XFF be spoofed in logs. The authoritative client IP lives upstream in the
    # WAF / proxy access logs. Don't add set_real_ip_from without pinning the exact
    # proxy subnet.

    # --- Compression (brotli isn't in alpine-slim; drop this if the proxy gzips) ---
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types      text/css application/javascript application/json
                    image/svg+xml application/manifest+json text/plain;

    # Security headers — single source of truth. add_header does NOT inherit into a
    # location that defines its own add_header, so the snippet is re-included in the
    # asset/document blocks below; location / inherits it from here.
    include /etc/nginx/snippets/security-headers.conf;

    # Block dotfiles (allow /.well-known for ACME / OIDC discovery).
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Content-hashed assets — safe to cache forever (a new build = a new filename).
    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files  $uri =404;          # a missing asset is a 404, not the SPA shell
    }

    # The document — never cache, always revalidate so a new deploy is picked up
    # immediately (it points at the new hashed assets). Reached both directly and
    # via the SPA fallback's internal redirect, so the header applies in both cases.
    location = /index.html {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # SPA fallback — TanStack Router resolves the route client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
