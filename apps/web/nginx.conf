server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Hashed assets — safe to cache long-term
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback — TanStack Router handles client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
