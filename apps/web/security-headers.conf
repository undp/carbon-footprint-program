# =============================================================================
#  security-headers.conf — response headers for every served response.
#
#  WHY A SEPARATE FILE: nginx's `add_header` is "all or nothing" per level — a
#  `location` that defines its OWN add_header drops every header inherited from
#  the parent. Keeping the headers here and `include`-ing this file in each block
#  that needs them (server scope + the asset/document locations) guarantees they
#  apply everywhere, from a single source of truth.
#
#  BUILD-TIME ORIGINS: the __PLACEHOLDER__ values are substituted in
#  apps/web/Dockerfile, each stripped to scheme://host[:port]:
#    __API_ORIGIN__     = the API         (from VITE_API_BASE_URL)
#    __IDP_ORIGIN__     = the OIDC issuer  (from VITE_OIDC_ISSUER)
#    __STORAGE_ORIGIN__ = object storage   (from STORAGE_ORIGIN; MinIO / Azure Blob)
#  An empty value simply leaves that origin out of the policy.
#
#  `always` (on every line below) = emit the header even on error responses
#  (4xx/5xx), not just 2xx/3xx — so the policy also covers error pages.
# =============================================================================


# -----------------------------------------------------------------------------
# Content-Security-Policy
# The browser's allow-list of what this page may load, run, or connect to. It is
# the primary defense against XSS / content injection: even if an attacker manages
# to inject markup, the browser refuses any source not listed here.
#
# It must be ONE header value, so the per-directive explanation lives in this
# comment. Each directive below maps 1:1 to a token in the add_header line.
#
#   default-src 'self'         Fallback for any resource type without its own rule
#                              (media, workers, manifest, ...): same origin only.
#   base-uri 'self'            Restricts <base href> → blocks re-rooting every
#                              relative URL to an attacker host. (Does NOT fall
#                              back to default-src, so it is set explicitly.)
#   object-src 'none'          Blocks <object>/<embed>/<applet> — legacy plugin
#                              (Flash/Java) vectors. Nothing allowed.
#   frame-ancestors 'none'     Who may embed US in an iframe → nobody. Anti-
#                              clickjacking; the modern X-Frame-Options: DENY.
#   script-src 'self'          JavaScript sources: same-origin scripts...
#     + 'unsafe-inline'        ...plus inline <script> and on*= handlers. A known
#                              XSS weakening — kept for now; the proper fix is
#                              nonces/hashes (a separate, app-side change).
#   style-src 'self'           CSS sources: same-origin...
#     + 'unsafe-inline'        ...plus inline styles, which the CSS-in-JS of
#                              MUI/emotion requires (it injects <style> tags).
#   img-src 'self' data:       Images: same origin, data: URIs (inlined/base64
#     blob: __STORAGE_ORIGIN__  icons), blob: (JS-generated previews) and the
#                              storage host. Scoped — no `https:` wildcard.
#   font-src 'self' data:      Fonts: same origin + inlined (data:) fonts. No
#                              external font CDNs.
#   connect-src 'self'         fetch/XHR/WebSocket/sendBeacon targets: same
#     __API_ORIGIN__            origin, the API, the IdP (token exchange + silent
#     __IDP_ORIGIN__            renew) and storage (presigned PUT/GET uploads).
#     __STORAGE_ORIGIN__        Scoped — replaces the old `https:` wildcard.
#   frame-src 'self'           Iframes WE embed: self + the IdP. oidc-client-ts
#     __IDP_ORIGIN__            does silent token renew via a hidden IdP iframe.
#   form-action 'self'         Where a <form> may POST: self + the IdP (the
#     __IDP_ORIGIN__            login form posts to the identity provider).
# -----------------------------------------------------------------------------
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: __STORAGE_ORIGIN__; font-src 'self' data:; connect-src 'self' __API_ORIGIN__ __IDP_ORIGIN__ __STORAGE_ORIGIN__; frame-src 'self' __IDP_ORIGIN__; form-action 'self' __IDP_ORIGIN__" always;


# -----------------------------------------------------------------------------
# X-Content-Type-Options: nosniff
# Stops the browser from "MIME-sniffing" a response into a type other than its
# declared Content-Type. Prevents e.g. a text/* upload from being executed as a
# script because the bytes happened to look like JavaScript.
# -----------------------------------------------------------------------------
add_header X-Content-Type-Options "nosniff" always;


# -----------------------------------------------------------------------------
# Referrer-Policy: strict-origin-when-cross-origin
# Controls how much of the current URL is sent in the Referer header:
#   - same origin       → full URL
#   - cross origin      → only the origin (no path/query) — avoids leaking, say,
#                         a token or id in a path to a third party
#   - HTTPS → HTTP      → nothing (don't leak a secure URL to an insecure site)
# This is the balanced modern default.
# -----------------------------------------------------------------------------
add_header Referrer-Policy "strict-origin-when-cross-origin" always;


# -----------------------------------------------------------------------------
# Permissions-Policy
# Turns OFF browser features the app doesn't use, so injected code can't request
# them either. `feature=()` with an empty allow-list = denied for everyone
# (including this origin). Add a feature here only if the app actually needs it.
# -----------------------------------------------------------------------------
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;


# -----------------------------------------------------------------------------
# X-Frame-Options: DENY
# Legacy clickjacking control for older browsers: refuse to be rendered inside a
# frame/iframe at all. Modern browsers rely on `frame-ancestors 'none'` in the
# CSP above; this is kept as belt-and-suspenders for old clients.
# -----------------------------------------------------------------------------
add_header X-Frame-Options "DENY" always;


# -----------------------------------------------------------------------------
# Cross-Origin-Opener-Policy: same-origin
# Puts this document in its own browsing-context group, severing the
# window.opener link to/from any cross-origin window. Defense against XS-Leaks
# that probe our window (iframe counts, navigation timing) through an opener
# reference held by a page that opened us.
# Safe here: OIDC uses the redirect flow (no popup), silent renew runs in an
# iframe (COOP does not apply to iframes), and every window.open() call already
# passes "noopener". Only honored over HTTPS — a no-op on the plain-HTTP dev
# origin, active once TLS terminates upstream.
# -----------------------------------------------------------------------------
add_header Cross-Origin-Opener-Policy "same-origin" always;


# -----------------------------------------------------------------------------
# Strict-Transport-Security (HSTS) — intentionally NOT set here.
# The browser only honors HSTS over HTTPS, and TLS terminates UPSTREAM (the WAF /
# edge); this container only ever speaks plain HTTP on the internal network. Set
# HSTS on the public HTTPS terminator, not here. Left as a reminder, commented:
# add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
# -----------------------------------------------------------------------------
