# MinIO (S3-compatible object storage) — dedicated, opt-in compose file.
#
# MinIO is only needed when STORAGE_PROVIDER=minio, so it lives outside the main
# docker-compose.yml. Run it one of two ways:
#
#   1. Full stack in containers (API reaches MinIO at http://minio:9000):
#        docker compose -f docker-compose.yml -f docker-compose.minio.yml up
#      (both files merge into one project and share `huella-network`)
#
#   2. MinIO only, with the API/web running on the host via `pnpm dev`
#      (point the app at MINIO_ENDPOINT=http://localhost:9000):
#        docker compose -f docker-compose.minio.yml up
#
# Console UI: http://localhost:9001 (default creds minioadmin / minioadmin).

services:
  minio:
    image: minio/minio:latest
    container_name: huella-latam-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_API_CORS_ALLOW_ORIGIN=${MINIO_API_CORS_ALLOW_ORIGIN:-*}
    volumes:
      - minio-data:/data
    restart: unless-stopped
    networks:
      - huella-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: creates the bucket, then exits.
  minio-init:
    image: minio/mc:latest
    container_name: huella-latam-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - huella-network
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-files}
      "

volumes:
  minio-data:
    driver: local

networks:
  huella-network:
    driver: bridge
