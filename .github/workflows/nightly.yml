name: Nightly

on:
  schedule:
    # Every day at 03:00 UTC (midnight Chile/Colombia)
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.role }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - role: ui
            script: |
              echo "## UI Report — $(date -u +%Y-%m-%d)" > report.md
              echo "" >> report.md

              echo "### Format Check" >> report.md
              if pnpm format:check 2>&1 | tee /tmp/format.log; then
                echo "✅ Formatting is clean." >> report.md
              else
                echo "❌ Formatting issues found:" >> report.md
                echo '```' >> report.md
                tail -20 /tmp/format.log >> report.md
                echo '```' >> report.md
              fi
              echo "" >> report.md

              echo "### Build" >> report.md
              if pnpm build 2>&1 | tee /tmp/build.log; then
                echo "✅ Build succeeded." >> report.md
              else
                echo "❌ Build failed:" >> report.md
                echo '```' >> report.md
                tail -30 /tmp/build.log >> report.md
                echo '```' >> report.md
              fi

          - role: tests
            script: |
              echo "## Tests Report — $(date -u +%Y-%m-%d)" > report.md
              echo "" >> report.md

              echo "### Lint" >> report.md
              if pnpm lint 2>&1 | tee /tmp/lint.log; then
                echo "✅ Lint passed (0 warnings)." >> report.md
              else
                echo "❌ Lint failed:" >> report.md
                echo '```' >> report.md
                tail -30 /tmp/lint.log >> report.md
                echo '```' >> report.md
              fi
              echo "" >> report.md

              echo "### Type Check" >> report.md
              if pnpm type-check 2>&1 | tee /tmp/typecheck.log; then
                echo "✅ Type check passed." >> report.md
              else
                echo "❌ Type check failed:" >> report.md
                echo '```' >> report.md
                tail -30 /tmp/typecheck.log >> report.md
                echo '```' >> report.md
              fi
              echo "" >> report.md

              echo "### Tests" >> report.md
              if pnpm test 2>&1 | tee /tmp/test.log; then
                echo "✅ All tests passed." >> report.md
              else
                echo "❌ Tests failed:" >> report.md
                echo '```' >> report.md
                tail -40 /tmp/test.log >> report.md
                echo '```' >> report.md
              fi

          - role: cleanup
            script: |
              echo "## Cleanup Report — $(date -u +%Y-%m-%d)" > report.md
              echo "" >> report.md

              echo "### Dependency Audit" >> report.md
              if pnpm audit --prod 2>&1 | tee /tmp/audit.log; then
                echo "✅ No known vulnerabilities." >> report.md
              else
                echo "⚠️ Vulnerabilities found:" >> report.md
                echo '```' >> report.md
                tail -30 /tmp/audit.log >> report.md
                echo '```' >> report.md
              fi
              echo "" >> report.md

              echo "### Outdated Dependencies" >> report.md
              echo '```' >> report.md
              pnpm outdated --no-table 2>&1 | head -40 >> report.md || true
              echo '```' >> report.md
              echo "" >> report.md

              echo "### Disk Usage" >> report.md
              echo '```' >> report.md
              du -sh node_modules apps/*/node_modules packages/*/node_modules 2>/dev/null | sort -rh | head -10 >> report.md
              echo '```' >> report.md

    env:
      VITE_API_BASE_URL: https://example.invalid
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.role }}
        run: ${{ matrix.script }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-${{ matrix.role }}
          path: report.md
          retention-days: 14

  synth:
    name: Synthesize Summary
    needs: checks
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: report-*
          merge-multiple: false

      - name: Build summary
        run: |
          {
            echo "# 🌙 Nightly Report — $(date -u +%Y-%m-%d)"
            echo ""
            echo "| Role | Status |"
            echo "|------|--------|"
            echo "| ui | ${{ needs.checks.result == 'success' && '✅' || '❌' }} |"
            echo "| tests | ${{ needs.checks.result == 'success' && '✅' || '❌' }} |"
            echo "| cleanup | ${{ needs.checks.result == 'success' && '✅' || '❌' }} |"
            echo ""
            echo "---"
            echo ""
          } > nightly-summary.md

          for dir in report-*/; do
            if [ -f "${dir}report.md" ]; then
              cat "${dir}report.md" >> nightly-summary.md
              echo "" >> nightly-summary.md
              echo "---" >> nightly-summary.md
              echo "" >> nightly-summary.md
            fi
          done

          # Also write to GitHub Actions Job Summary
          cat nightly-summary.md >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: nightly-summary
          path: nightly-summary.md
          retention-days: 30
