# ═══════════════════════════════════════════════════════════════════════
# Deploy to QAS Environment
# ═══════════════════════════════════════════════════════════════════════
#
# Triggers on every push/merge to main.
# Pipeline order: Infrastructure → (Web + API in parallel) → Migrations
#
# Prerequisites:
#   1. Create a GitHub Environment named "qas"
#   2. Create an Azure AD app registration for GitHub Actions (OIDC)
#      - Configure federated credential for repo: <org>/<repo>, branch: main
#      - Grant "Contributor" + "Key Vault Secrets User" roles on the resource group
#   3. Set the following secrets in the "qas" environment:
#      - AZURE_CLIENT_ID:       Service principal (app registration) client ID
#      - AZURE_TENANT_ID:       Azure AD tenant ID
#      - AZURE_SUBSCRIPTION_ID: Azure subscription ID
#   4. Set the following variables in the "qas" environment:
#      - ENVIRONMENT:              e.g. "qas"
#      - AZURE_RESOURCE_GROUP:     e.g. "undp-huella-latam-qas-rg"
#      - LOCATION:                 e.g. "eastus2"
#      - AZURE_FRONT_CLIENT_ID:    Frontend app registration client ID
#      - AZURE_API_CLIENT_ID:      API app registration client ID
#      - AZURE_AUTH_AUTHORITY:      Auth authority URL
#      - AZURE_TENANT_TYPE:        "external" or "organizational"
#      - AZURE_TENANT_SUBDOMAIN:   Tenant subdomain (for external/CIAM tenants)
#   5. (Optional) Create infra/params/main.qas.bicepparam for QAS-specific
#      resource sizing. Falls back to main.development.bicepparam if absent.
#
# ═══════════════════════════════════════════════════════════════════════

name: Deploy to QAS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-qas
  cancel-in-progress: false # Never cancel an in-progress deployment

permissions:
  id-token: write # Required for Azure OIDC authentication
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # 1. Deploy Infrastructure (Bicep → Azure)
  # ─────────────────────────────────────────────
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    environment: qas
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep Stack
        working-directory: infra
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          LOCATION: ${{ vars.LOCATION }}
          ENVIRONMENT: ${{ vars.ENVIRONMENT }}
          AZURE_FRONT_CLIENT_ID: ${{ vars.AZURE_FRONT_CLIENT_ID }}
          AZURE_API_CLIENT_ID: ${{ vars.AZURE_API_CLIENT_ID }}
          AZURE_TENANT_TYPE: ${{ vars.AZURE_TENANT_TYPE }}
          AZURE_TENANT_SUBDOMAIN: ${{ vars.AZURE_TENANT_SUBDOMAIN }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          set -euo pipefail

          az account set --subscription "$AZURE_SUBSCRIPTION_ID"
          az group create --name "$AZURE_RESOURCE_GROUP" --location "$LOCATION" --output none

          STACK_NAME="undp-huella-latam-stack-$ENVIRONMENT"

          # ── Resolve DB password (preserve existing or generate new) ──
          EXISTING_VAULT=$(az keyvault list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "[0].name" -o tsv 2>/dev/null || echo "")

          DB_PASSWORD=""
          if [ -n "$EXISTING_VAULT" ]; then
            SECRET_EXISTS=$(az keyvault secret show \
              --vault-name "$EXISTING_VAULT" \
              --name "postgres-admin-password" \
              --query "name" -o tsv 2>/dev/null || echo "")
            if [ -z "$SECRET_EXISTS" ]; then
              DB_PASSWORD=$(openssl rand -hex 32)
              echo "Generated new database password"
            else
              echo "Existing database password found — preserving"
            fi
          else
            DB_PASSWORD=$(openssl rand -hex 32)
            echo "No Key Vault found — generating new database password"
          fi

          # ── Select Bicep parameters file ──
          if [ -f "params/main.${ENVIRONMENT}.bicepparam" ]; then
            PARAMS_FILE="params/main.${ENVIRONMENT}.bicepparam"
          else
            PARAMS_FILE="params/main.development.bicepparam"
          fi
          echo "Using parameters file: $PARAMS_FILE"

          # ── Build deployment parameters ──
          DEPLOY_PARAMS=(
            --name "$STACK_NAME"
            --resource-group "$AZURE_RESOURCE_GROUP"
            --template-file main.bicep
            --parameters "$PARAMS_FILE"
            --parameters dbPassword="$DB_PASSWORD"
            --parameters devGroupObjectId=""
            --parameters environment="$ENVIRONMENT"
          )

          # ── Add Azure auth parameters if configured ──
          if [ -n "${AZURE_TENANT_ID:-}" ] && [ -n "${AZURE_FRONT_CLIENT_ID:-}" ] && [ -n "${AZURE_API_CLIENT_ID:-}" ]; then
            echo "Azure authentication parameters detected — including in deployment"
            DEPLOY_PARAMS+=(--parameters enableAzureAuth=true)
            DEPLOY_PARAMS+=(--parameters azureAuthTenantId="$AZURE_TENANT_ID")
            DEPLOY_PARAMS+=(--parameters azureAuthFrontAppId="$AZURE_FRONT_CLIENT_ID")
            DEPLOY_PARAMS+=(--parameters azureAuthApiAppId="$AZURE_API_CLIENT_ID")
            DEPLOY_PARAMS+=(--parameters azureAuthTenantType="${AZURE_TENANT_TYPE:-external}")
            DEPLOY_PARAMS+=(--parameters azureAuthTenantSubdomain="${AZURE_TENANT_SUBDOMAIN:-}")
          fi

          # ── Deploy stack ──
          az stack group create \
            "${DEPLOY_PARAMS[@]}" \
            --deny-settings-mode none \
            --action-on-unmanage detachAll \
            --yes \
            --verbose

          echo "Infrastructure deployment completed"

  # ─────────────────────────────────────────────
  # 2a. Build & Deploy Web (Static Web App)
  # ─────────────────────────────────────────────
  deploy-web:
    name: Deploy Web
    needs: deploy-infra
    runs-on: ubuntu-latest
    environment: qas
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and deploy
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          ENVIRONMENT: ${{ vars.ENVIRONMENT }}
          VITE_AZURE_FRONT_CLIENT_ID: ${{ vars.AZURE_FRONT_CLIENT_ID }}
          VITE_AZURE_API_CLIENT_ID: ${{ vars.AZURE_API_CLIENT_ID }}
          VITE_AZURE_AUTH_AUTHORITY: ${{ vars.AZURE_AUTH_AUTHORITY }}
          VITE_IS_DEMO_APP: ${{ vars.VITE_IS_DEMO_APP }}
        run: |
          set -euo pipefail

          STACK_NAME="undp-huella-latam-stack-$ENVIRONMENT"

          # ── Resolve URLs from deployment stack ──
          SWA_NAME=$(az stack group show \
            --name "$STACK_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query outputs.staticWebAppName.value -o tsv)

          SWA_HOSTNAME=$(az staticwebapp show \
            --name "$SWA_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query defaultHostname -o tsv)

          API_URL=$(az stack group show \
            --name "$STACK_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "outputs.api.value.appService.url" -o tsv)

          export VITE_API_BASE_URL="${API_URL%/}/api"
          export VITE_FRONT_BASE_URL="https://$SWA_HOSTNAME"
          export VITE_APP_VERSION="${GITHUB_SHA::7}"

          echo "VITE_API_BASE_URL=$VITE_API_BASE_URL"
          echo "VITE_FRONT_BASE_URL=$VITE_FRONT_BASE_URL"

          # ── Build ──
          pnpm build

          # ── Deploy to Static Web App ──
          DEPLOYMENT_TOKEN=$(az staticwebapp secrets list \
            --name "$SWA_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query properties.apiKey -o tsv)

          npx --yes @azure/static-web-apps-cli@2.0.7 deploy \
            --deployment-token "$DEPLOYMENT_TOKEN" \
            --app-location ./apps/web \
            --output-location dist \
            --env production \
            --no-use-keychain

          echo "Web deployment completed — https://$SWA_HOSTNAME"

  # ─────────────────────────────────────────────
  # 2b. Build & Deploy API (Docker → ACR → App Service)
  # ─────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    needs: deploy-infra
    runs-on: ubuntu-latest
    environment: qas
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and deploy
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          ENVIRONMENT: ${{ vars.ENVIRONMENT }}
        run: |
          set -euo pipefail

          STACK_NAME="undp-huella-latam-stack-$ENVIRONMENT"
          IMAGE_NAME="api"
          IMAGE_TAG="${GITHUB_SHA::7}"

          # ── Get ACR and App Service details from stack ──
          APP_SERVICE_NAME=$(az stack group show \
            --name "$STACK_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "outputs.api.value.appService.name" -o tsv)

          ACR_LOGIN_SERVER=$(az stack group show \
            --name "$STACK_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "outputs.acrLoginServer.value" -o tsv)

          ACR_NAME="${ACR_LOGIN_SERVER%%.azurecr.io}"
          FULL_IMAGE="$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG"

          echo "App Service: $APP_SERVICE_NAME"
          echo "Image: $FULL_IMAGE"

          # ── Build and push Docker image ──
          az acr login -n "$ACR_NAME"

          docker build \
            --platform linux/amd64 \
            -f apps/api/Dockerfile \
            -t "$FULL_IMAGE" .

          docker push "$FULL_IMAGE"

          # ── Update App Service to use new image ──
          az resource update \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$APP_SERVICE_NAME/config/web" \
            --resource-type "Microsoft.Web/sites/config" \
            --set properties.linuxFxVersion="DOCKER|$FULL_IMAGE" \
            --set properties.acrUseManagedIdentityCreds=true \
            --output none

          az webapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$APP_SERVICE_NAME" \
            --settings WEBSITES_PORT=8080 APP_VERSION="$IMAGE_TAG" \
            --output none

          az webapp restart \
            -g "$AZURE_RESOURCE_GROUP" \
            -n "$APP_SERVICE_NAME"

          HOSTNAME=$(az webapp show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$APP_SERVICE_NAME" \
            --query defaultHostName -o tsv)

          echo "API deployment completed — https://$HOSTNAME"

  # ─────────────────────────────────────────────
  # 3. Run Database Migrations
  # ─────────────────────────────────────────────
  run-migrations:
    name: Run Migrations
    needs: [deploy-web, deploy-api]
    runs-on: ubuntu-latest
    environment: qas
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Prisma migrations
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          ENVIRONMENT: ${{ vars.ENVIRONMENT }}
        run: |
          set -euo pipefail

          STACK_NAME="undp-huella-latam-stack-$ENVIRONMENT"

          # ── Fetch DB connection info from stack ──
          DB_HOST=$(az stack group show \
            --name "$STACK_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query outputs.database.value.host -o tsv)

          DB_NAME=$(az stack group show \
            --name "$STACK_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query outputs.database.value.databaseName -o tsv)

          DB_USER=$(az stack group show \
            --name "$STACK_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query outputs.database.value.username -o tsv)

          echo "Database: $DB_USER@$DB_HOST/$DB_NAME"

          # ── Retrieve password from Key Vault ──
          KEY_VAULT_NAME=$(az stack group show \
            --name "$STACK_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query outputs.infrastructure.value.keyVault.name -o tsv)

          DB_PASSWORD=$(az keyvault secret show \
            --vault-name "$KEY_VAULT_NAME" \
            --name "postgres-admin-password" \
            --query value -o tsv)

          # ── Run migrations ──
          export DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:5432/${DB_NAME}?sslmode=require"

          cd packages/database
          pnpm prod:deploy

          echo "Migrations completed successfully"
