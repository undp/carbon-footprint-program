name: CodeQL

# Static analysis (SAST) for OpenSSF Scorecard / DPG Indicator 8. CodeQL uploads results to
# GitHub code scanning, which is free for public repositories. NOTE: while this repository is
# still private (and without GitHub Advanced Security) the "Analyze" upload step will fail;
# it starts working automatically once the repository is made public.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "31 4 * * 1" # weekly, Monday 04:31 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload results to code scanning
      actions: read # required for private repos
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      # JavaScript/TypeScript is interpreted — no build step required.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
