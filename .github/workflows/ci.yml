name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-draft:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - run: echo "Not a draft, proceeding"

  lint:
    needs: check-draft
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  type-check:
    needs: check-draft
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check

  format:
    needs: check-draft
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  test:
    needs: check-draft
    name: Test (${{ matrix.storage_provider }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        storage_provider: [azure_blob_storage, minio]
    env:
      STORAGE_PROVIDER: ${{ matrix.storage_provider }}
      # Provider-specific vars below satisfy the conditional validation in
      # apps/api/src/config/environment.ts. Real connection details come from
      # the testcontainer started by globalSetup.ts.
      AZURE_STORAGE_ACCOUNT_NAME: devstoreaccount1
      AZURE_STORAGE_CONTAINER_NAME: test-files
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: test-files
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.storage_provider }}
          path: apps/api/coverage/
          retention-days: 7

  build:
    needs: check-draft
    name: Build
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: https://example.invalid
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  audit:
    needs: check-draft
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # `pnpm audit` resolves the dependency graph from pnpm-lock.yaml, so no
      # install is needed. This also keeps the gate independent of the
      # minimumReleaseAge install check (which can transiently reject freshly
      # published, not-yet-aged lockfile entries).
      - run: pnpm audit --prod --audit-level moderate
