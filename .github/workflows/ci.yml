name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Minimal default token scope for every job (jobs override as needed). Reading
# the repository is all the build/test jobs require.
permissions:
  contents: read

jobs:
  check-draft:
    name: Check Draft
    runs-on: ubuntu-latest
    permissions: {}
    if: github.event.pull_request.draft == false
    steps:
      - run: echo "Not a draft, proceeding"

  # Detect whether code/config (as opposed to docs-only) changed, so the heavy
  # jobs (lint, type-check, test, build) can no-op on docs-only PRs.
  #
  # DEADLOCK-SAFE PATTERN: those jobs still RUN and report their (required)
  # status check on every PR — they only skip their expensive *steps* when
  # `code == 'false'`. We deliberately avoid `on.paths` / `paths-ignore` and a
  # job-level `if:`, because a required check that never reports would leave the
  # PR "pending" forever under branch protection. An always-running job that
  # executes zero steps still reports success.
  changes:
    needs: check-draft
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          # `code` is true if anything that can affect lint/types/tests/build
          # changed. Intentionally broad (errs toward running): a docs edit under
          # apps/** would still run the heavy jobs, but a pure docs/**-or-*.md PR
          # skips them.
          filters: |
            code:
              - 'apps/**'
              - 'packages/**'
              - 'tools/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - '.nvmrc'
              - '**/package.json'
              - '**/tsconfig*.json'
              - '.github/workflows/ci.yml'

  lint:
    needs: [check-draft, changes]
    name: Lint
    runs-on: ubuntu-latest
    # Every step gated on `code`, so this is a fast no-op success on docs-only
    # PRs while still reporting the required "Lint" check.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: needs.changes.outputs.code == 'true'
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        if: needs.changes.outputs.code == 'true'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: needs.changes.outputs.code == 'true'
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: needs.changes.outputs.code == 'true'
      - run: pnpm lint
        if: needs.changes.outputs.code == 'true'

  type-check:
    needs: [check-draft, changes]
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: needs.changes.outputs.code == 'true'
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        if: needs.changes.outputs.code == 'true'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: needs.changes.outputs.code == 'true'
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: needs.changes.outputs.code == 'true'
      - run: pnpm type-check
        if: needs.changes.outputs.code == 'true'

  format:
    needs: check-draft
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  test:
    needs: [check-draft, changes]
    name: Test (${{ matrix.storage_provider }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        storage_provider: [azure_blob_storage, minio]
    env:
      STORAGE_PROVIDER: ${{ matrix.storage_provider }}
      # Provider-specific vars below satisfy the conditional validation in
      # apps/api/src/config/environment.ts. Real connection details come from
      # the testcontainer started by globalSetup.ts.
      AZURE_STORAGE_ACCOUNT_NAME: devstoreaccount1
      AZURE_STORAGE_CONTAINER_NAME: test-files
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: test-files
    # This is the ~7-minute job; gating its steps is where docs-only PRs save the
    # most. Both matrix legs still report their required "Test (...)" checks.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: needs.changes.outputs.code == 'true'
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        if: needs.changes.outputs.code == 'true'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: needs.changes.outputs.code == 'true'
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: needs.changes.outputs.code == 'true'
      - run: pnpm test
        if: needs.changes.outputs.code == 'true'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always() && needs.changes.outputs.code == 'true'
        with:
          name: coverage-report-${{ matrix.storage_provider }}
          path: apps/api/coverage/
          retention-days: 7

  build:
    needs: [check-draft, changes]
    name: Build
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: https://example.invalid
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: needs.changes.outputs.code == 'true'
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        if: needs.changes.outputs.code == 'true'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: needs.changes.outputs.code == 'true'
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: needs.changes.outputs.code == 'true'
      - run: pnpm build
        if: needs.changes.outputs.code == 'true'

  audit:
    needs: check-draft
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      # `pnpm audit` resolves the dependency graph from pnpm-lock.yaml, so no
      # install is needed. This also keeps the gate independent of the
      # minimumReleaseAge install check (which can transiently reject freshly
      # published, not-yet-aged lockfile entries).
      - run: pnpm audit --prod --audit-level moderate

  zizmor:
    needs: check-draft
    name: Zizmor (GitHub Actions security)
    runs-on: ubuntu-latest
    permissions:
      contents: read # required to check out the (private) repository
      actions: read # required by zizmor's online audits on a private repository
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          # Print findings to the log and fail the job on findings. Advanced
          # Security (SARIF upload to the security tab) is not used because this
          # repository is private and does not depend on that paid feature.
          advanced-security: false

  docs-links:
    needs: check-draft
    name: Docs Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for broken local links in Markdown docs
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # Offline mode validates only local/relative file links — the class of
          # breakage that has bitten this repo (moved/renamed docs, wrong paths).
          # External URLs are skipped, so the gate is deterministic and never
          # flakes on network or rate limits. No GITHUB_TOKEN needed.
          args: "--offline --no-progress --exclude-path node_modules README.md 'docs/**/*.md' 'apps/**/README.md' 'packages/**/README.md'"
          fail: true

  secret-scan:
    needs: check-draft
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full history so the scan covers every commit on the branch, not just
          # the tip — this is how the "0 findings" baseline was measured.
          fetch-depth: 0
      - name: Scan for secrets (betterleaks)
        # The betterleaks image is pinned by digest in .github/secret-scan/Dockerfile
        # rather than referenced inline here, so Dependabot's `docker` ecosystem keeps
        # it current automatically (Dependabot cannot see an image used in a `run:`
        # step). We build that single-FROM image and run it. betterleaks is the drop-in
        # successor to the now feature-frozen gitleaks and reads the repo's
        # .gitleaks.toml allowlist. `detect` scans the full git history and exits
        # non-zero on any finding that is not allowlisted.
        run: |
          docker build -t secret-scan .github/secret-scan
          docker run --rm -v "$PWD:/repo" -w /repo secret-scan \
            detect --source=. --config=.gitleaks.toml --redact --no-banner --exit-code=1
