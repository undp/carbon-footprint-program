version: 2

updates:
  # Application & workspace dependencies.
  # pnpm monorepo: a single root pnpm-lock.yaml covers apps/*, packages/*, and
  # tools/* via the workspace, so Dependabot is pointed at the root directory.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Wait 7 days before proposing a version. A compromised release is usually
    # caught and yanked within days, so this cooldown reduces supply-chain risk
    # (zizmor's dependabot-cooldown audit). It is also well beyond the
    # `minimumReleaseAge` (12h) install delay in pnpm-workspace.yaml, so
    # Dependabot never proposes a version the CI install gate would reject.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    ignore:
      # Defer the MUI Core v7 -> v9 major upgrade. It must land as one
      # coordinated change (@mui/icons-material peer-depends on @mui/material's
      # exact major), so we keep taking v7 minor/patch updates and ignore the
      # major until it is done deliberately. Tracked in issue #443.
      - dependency-name: "@mui/material"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@mui/icons-material"
        update-types: ["version-update:semver-major"]
    groups:
      # Collapse low-risk updates into a single PR to cut review noise.
      # Security updates and majors still open their own PRs.
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # Docker base images in the API and web Dockerfiles (FROM ...@sha256:...).
  # With digests pinned, Dependabot opens PRs to bump them as the upstream
  # tags move (e.g. Alpine security patches), keeping them current but reviewed.
  - package-ecosystem: "docker"
    directories:
      - "/apps/api"
      - "/apps/web"
    schedule:
      interval: "weekly"
    # Supply-chain cooldown before proposing a new base-image digest.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"

  # GitHub Actions used by the CI workflow (checkout, setup-node, action-setup).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Supply-chain cooldown before proposing a new action version.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci"
      include: "scope"
