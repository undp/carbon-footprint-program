# Keycloak dev IdP overlay (generic OIDC, local development only).
#
# Two services: `keycloak` itself and `keycloak-init`, a one-shot (same
# pattern as the base stack's `migrate`) — see its comment below for what it
# does.
#
# Database — pairs with EITHER:
#   • the bundled compose/keycloak-db.yaml (the SAME generic DB file prod
#     uses); zero config, defaults to keycloak/keycloak. OR
#   • an external Postgres: omit keycloak-db.yaml and set KC_DB_URL_HOST
#     (+ KC_DB_USERNAME / KC_DB_PASSWORD) in .env.keycloak (from
#     .env.keycloak.example — the canonical home for dev Keycloak DB overrides).
#
# Bring-up — full copy-paste command matrix is in the "Quick Setup" section of
# docs/infrastructure/KeycloakSetup.md. Alongside the full app stack (base
# compose listed FIRST, so relative paths resolve to the repo root):
#   docker compose -f docker-compose.yml -f compose/keycloak-db.yaml \
#     -f compose/keycloak.dev.yaml --env-file .env.dockercompose \
#     up -d keycloak keycloak-db keycloak-init
# or COMPOSE_FILE=docker-compose.yml:compose/keycloak-db.yaml:compose/keycloak.dev.yaml
# Keycloak-only (app running on the host via `pnpm dev`): run from the repo
# root WITH `--project-directory .` (this file lives in compose/, so relative
# paths need the pinned project dir) — see the doc's Quick Setup.
#
# Pair with the API's Keycloak JWKS env (see the "Keycloak (generic OIDC) example"
# block in .env.dockercompose.example): AUTH_PROVIDER=jwks, JWKS_ISSUER,
# JWKS_URI (internal host), JWKS_AUDIENCE=huella-api, JWKS_REQUIRED_SCOPE=access_as_user.

services:
  keycloak:
    # Digest-pinned for reproducibility; bump the tag and digest together.
    image: quay.io/keycloak/keycloak:26.1.5@sha256:be6a86215213145bfb4fb3e2b3ab982a806d00262655abdcf3ffa6a38d241c7c
    container_name: huella-latam-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      # Browser-facing base URL → token issuer = <KC_HOSTNAME>/realms/huella.
      # Env-driven with a localhost default (same pattern as
      # compose/keycloak.prod.yaml), so the zero-config dev path is unchanged.
      # It MUST match VITE_OIDC_ISSUER / JWKS_ISSUER in the app env: the browser
      # posts the token request to this exact host and the web CSP is built from
      # VITE_OIDC_ISSUER, so a mismatch (e.g. localhost here vs a LAN IP there) is
      # blocked. Override it to your machine's LAN IP (e.g. http://<lan-ip>:18080)
      # to reach the app from another device on the network.
      # The api still fetches JWKS internally at http://keycloak:8080/... via an
      # explicit JWKS_URI (no discovery), so this host never has to resolve from
      # inside the api container. This split is the #1 thing to get right.
      - KC_HOSTNAME=${KC_HOSTNAME:-http://localhost:18080}
      - KC_HTTP_ENABLED=true
      - KC_HEALTH_ENABLED=true
      # Bootstrap admin (dev only) — Keycloak 26 env names.
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      # DB connection — same KC_DB_* vars/pattern as compose/keycloak.prod.yaml.
      # Defaults target the bundled compose/keycloak-db.yaml service (host
      # `keycloak-db`, db/user/pass `keycloak`), so dev needs no env. To use an
      # external Postgres instead, omit keycloak-db.yaml and set KC_DB_URL_HOST
      # (+ KC_DB_USERNAME / KC_DB_PASSWORD); set the full KC_DB_URL for extras
      # like ?sslmode=require. The URL is composed by Compose so Keycloak always
      # receives one non-empty value (a present-but-empty KC_DB_URL="" would
      # otherwise fail — same guard as prod).
      - KC_DB=${KC_DB:-postgres}
      - KC_DB_URL=${KC_DB_URL:-jdbc:postgresql://${KC_DB_URL_HOST:-keycloak-db}:${KC_DB_URL_PORT:-5432}/${KC_DB_URL_DATABASE:-keycloak}}
      - KC_DB_USERNAME=${KC_DB_USERNAME:-keycloak}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD:-keycloak}
      # Postgres schema (namespace) Keycloak's tables live in. Defaults to
      # `public`, so this is a no-op unless you point it at a specific schema —
      # useful when the DB is shared and Keycloak must be namespaced. The `:-`
      # fallback means an unset OR empty value both resolve to `public`, so
      # Keycloak never receives an empty db-schema. The schema must already
      # exist: Keycloak creates its tables inside it but does NOT create the
      # schema itself (for the bundled DB, `public` always exists).
      - KC_DB_SCHEMA=${KC_DB_SCHEMA:-public}
    ports:
      # Host 18080→container 8080 to avoid the api's host 8080 (1-prefix,
      # like the DB's 15432); container/JWKS stays 8080.
      - "18080:8080"
    volumes:
      # Realm export imported on first boot via --import-realm. This mounts the
      # dev-only import dir infra/keycloak/dev/ (its permissive
      # realm-huella.dev.json); the production stack mounts infra/keycloak/prod/
      # instead — symmetric structure, each stack only ever sees its own realm.
      # See compose/keycloak.prod.yaml.
      - ./infra/keycloak/dev:/opt/keycloak/data/import:ro
    # No depends_on: this overlay must also run standalone against an external
    # Postgres (no keycloak-db service in the model then). With the bundled DB,
    # Keycloak retries the connection at boot and `restart: unless-stopped` is
    # the backstop until keycloak-db is healthy — same approach as
    # compose/keycloak.prod.yaml.
    restart: unless-stopped
    networks:
      - huella-network
    healthcheck:
      # The Keycloak image ships no curl/wget; probe the management port (9000)
      # /health/ready over bash /dev/tcp. 127.0.0.1 forces IPv4: the management
      # port listens IPv4-only and localhost would otherwise resolve to ::1.
      # Match the response STATUS LINE (HTTP 200 ⇒ ready, else 503), not a JSON
      # `UP` substring, which false-positives when a nested per-check body
      # contains UP while the top-level status is DOWN.
      test:
        - CMD-SHELL
        - "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -qE '^HTTP/[0-9.]+ 200'"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  # Dev one-shot: sets master.sslRequired=NONE so the admin console works
  # over HTTP; idempotent, re-runs on every up.
  keycloak-init:
    # Digest-pinned for reproducibility; bump the tag and digest together.
    image: quay.io/keycloak/keycloak:26.1.5@sha256:be6a86215213145bfb4fb3e2b3ab982a806d00262655abdcf3ffa6a38d241c7c
    container_name: huella-latam-keycloak-init
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        /opt/keycloak/bin/kcadm.sh config credentials \
          --server http://keycloak:8080 --realm master \
          --user admin --password admin
        /opt/keycloak/bin/kcadm.sh update realms/master -s sslRequired=NONE
        echo "master realm relaxed to sslRequired=NONE (dev only)"
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"
    networks:
      - huella-network

networks:
  huella-network:
    driver: bridge
