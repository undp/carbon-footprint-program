# Keycloak dev IdP overlay (generic OIDC, local development only).
#
# Combine with the base stack — either:
#   docker compose -f docker-compose.yml -f compose/keycloak.yaml up
# or set in your env file:
#   COMPOSE_FILE=docker-compose.yml:compose/keycloak.yaml
#
# Pair with the API's Keycloak JWKS env (see the "Keycloak (generic OIDC) example"
# block in .env.dockercompose.example): AUTH_PROVIDER=jwks, JWKS_ISSUER,
# JWKS_URI (internal host), JWKS_AUDIENCE=huella-api, JWKS_REQUIRED_SCOPE=access_as_user,
# and the auth AZURE_* vars left empty.
#
# Reuses the base `huella-network`; do not run this overlay standalone.

services:
  keycloak-db:
    image: postgres:18-alpine
    container_name: huella-latam-keycloak-db
    environment:
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=keycloak
      - POSTGRES_DB=keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql
    restart: unless-stopped
    networks:
      - huella-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: huella-latam-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      # Browser-facing base URL → token issuer = http://localhost:8081/realms/huella.
      # The api fetches JWKS internally at http://keycloak:8080/... via an explicit
      # JWKS_URI (no discovery), so this localhost host never has to resolve from
      # inside the api container. This split is the #1 thing to get right.
      - KC_HOSTNAME=http://localhost:8081
      - KC_HTTP_ENABLED=true
      - KC_HEALTH_ENABLED=true
      # Bootstrap admin (dev only) — Keycloak 26 env names.
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak
    ports:
      # Host 8081 → container 8080 (the api already maps host 8080). Issuer uses 8081.
      - "8081:8080"
    volumes:
      # Realm export imported on first boot via --import-realm.
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - huella-network
    healthcheck:
      # The Keycloak image ships no curl/wget; probe the management port (9000)
      # /health/ready over bash /dev/tcp. 127.0.0.1 forces IPv4 (the localhost→::1
      # gotcha that left the web container unhealthy).
      test:
        - CMD-SHELL
        - "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q UP"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  keycloak-db-data:
    driver: local
