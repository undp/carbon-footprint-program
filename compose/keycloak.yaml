# Keycloak dev IdP overlay (generic OIDC, local development only).
#
# Combine with the base stack — either:
#   docker compose -f docker-compose.yml -f compose/keycloak.yaml up
# or set in your env file:
#   COMPOSE_FILE=docker-compose.yml:compose/keycloak.yaml
#
# Pair with the API's Keycloak JWKS env (see the "Keycloak (generic OIDC) example"
# block in .env.dockercompose.example): AUTH_PROVIDER=jwks, JWKS_ISSUER,
# JWKS_URI (internal host), JWKS_AUDIENCE=huella-api, JWKS_REQUIRED_SCOPE=access_as_user.
#
# Database: no dedicated Postgres container. Keycloak stores its own tables in
# the SAME external PostgreSQL server the app uses (the `huella-rd` database),
# isolated under its own schema (KEYCLOAK_DB_SCHEMA, default "keycloack") so it
# never collides with the app's tables (default `public` schema).
# ⚠️ Postgres does NOT auto-create schemas, and Keycloak does not either — the
# schema must exist in `huella-rd` BEFORE first boot:
#   CREATE SCHEMA IF NOT EXISTS keycloack AUTHORIZATION <KEYCLOAK_DB_USERNAME>;
# Set KEYCLOAK_DB_HOST/PORT/NAME/SCHEMA/USERNAME/PASSWORD in your env file.
#
# Reuses the base `huella-network`; do not run this overlay standalone.

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: huella-latam-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      # Browser-facing base URL → token issuer = http://localhost:8081/realms/huella.
      # The api fetches JWKS internally at http://keycloak:8080/... via an explicit
      # JWKS_URI (no discovery), so this localhost host never has to resolve from
      # inside the api container. This split is the #1 thing to get right.
      - KC_HOSTNAME=http://localhost:8081
      - KC_HTTP_ENABLED=true
      - KC_HEALTH_ENABLED=true
      # Bootstrap admin (dev only) — Keycloak 26 env names.
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      # External PostgreSQL server — the SAME instance/database as the app
      # (`huella-rd`), scoped to its own schema so it never touches the app's
      # tables. Host/credentials have no default: they are environment-specific
      # and must be provided.
      - KC_DB_URL=jdbc:postgresql://${KEYCLOAK_DB_HOST:?KEYCLOAK_DB_HOST is required (the huella-rd Postgres server)}:${KEYCLOAK_DB_PORT:-5432}/${KEYCLOAK_DB_NAME:-huella-rd}
      - KC_DB_SCHEMA=${KEYCLOAK_DB_SCHEMA:-keycloack}
      - KC_DB_USERNAME=${KEYCLOAK_DB_USERNAME:?KEYCLOAK_DB_USERNAME is required}
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD is required}
    ports:
      # Host 8081 → container 8080 (the api already maps host 8080). Issuer uses 8081.
      - "8081:8080"
    volumes:
      # Realm export imported on first boot via --import-realm.
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    restart: unless-stopped
    networks:
      - huella-network
    healthcheck:
      # The Keycloak image ships no curl/wget; probe the management port (9000)
      # /health/ready over bash /dev/tcp. 127.0.0.1 forces IPv4: the management
      # port listens IPv4-only and localhost would otherwise resolve to ::1.
      test:
        - CMD-SHELL
        - "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q UP"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
